<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control de Cuartel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e9ecef;
      color: #222;
    }

    header {
      height: 78px;
      background: #b40000;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 26px;
    }

    .titulo {
      font-size: 28px;
      font-weight: bold;
    }

    .hora {
      font-size: 18px;
      font-weight: bold;
    }

    .barra {
      height: 72px;
      background: white;
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 20px;
      align-items: center;
      padding: 10px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .barra input {
      width: 100%;
      height: 48px;
      font-size: 22px;
      text-align: center;
      border-radius: 10px;
      border: 2px solid #bbb;
    }

    .contador {
      background: #168a3a;
      color: white;
      border-radius: 12px;
      text-align: center;
      padding: 8px;
      font-weight: bold;
    }

    .contador-num {
      font-size: 30px;
      line-height: 30px;
    }

    .contador-texto {
      font-size: 13px;
    }

    .mensaje {
      height: 28px;
      text-align: center;
      font-weight: bold;
      padding-top: 5px;
    }

    .layout {
      display: grid;
      grid-template-columns: 255px 1fr;
      gap: 16px;
      padding: 16px;
    }

    .unidades {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .unidad {
      background: white;
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      min-height: 132px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      border-left: 12px solid #999;
    }

    .unidad:hover {
      transform: scale(1.01);
    }

    .unidad h2 {
      margin: 0;
      font-size: 30px;
    }

    .unidad .estado-unidad {
      font-weight: bold;
      margin: 4px 0 8px;
    }

    .unidad.sin-conductor {
      border-left-color: #d8a600;
    }

    .unidad.disponible {
      border-left-color: #168a3a;
    }

    .unidad.fuera-de-servicio {
      border-left-color: #c40000;
    }

    .conductores {
      font-size: 13px;
      line-height: 19px;
    }

    .personal {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
      gap: 14px;
      align-content: start;
    }

    .bombero {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      border: 4px solid #aaa;
    }

    .bombero:hover {
      transform: scale(1.02);
    }

    .bombero img {
      width: 100%;
      height: 145px;
      object-fit: cover;
      background: #ddd;
      display: block;
    }

    .bombero-info {
      padding: 8px;
      text-align: center;
    }

    .nombre {
      font-weight: bold;
      font-size: 14px;
      line-height: 16px;
    }

    .cargo {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    .estado {
      font-size: 13px;
      font-weight: bold;
      margin-top: 5px;
    }

    .bombero.disponible {
      border-color: #168a3a;
    }

    .bombero.no-disponible {
      border-color: #c40000;
    }

    .bombero.en-capacitacion {
      border-color: #0066cc;
    }

    .bombero.en-emergencia {
      border-color: #ff7a00;
    }

    .modal-fondo {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .modal {
      width: 92%;
      max-width: 620px;
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    .modal h2 {
      margin-top: 0;
      color: #b40000;
    }

    .modal-opciones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .btn {
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-verde {
      background: #168a3a;
      color: white;
    }

    .btn-azul {
      background: #0066cc;
      color: white;
    }

    .btn-rojo {
      background: #c40000;
      color: white;
    }

    .btn-gris {
      background: #ddd;
      color: #222;
    }

    .lista-conductores {
      margin-top: 16px;
      max-height: 300px;
      overflow-y: auto;
      display: none;
    }

    .conductor-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }

    .conductor-item:hover {
      background: #f1f1f1;
    }

    .conductor-item img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background: #ddd;
    }

    @media (max-width: 850px) {
      header {
        height: auto;
        flex-direction: column;
        padding: 12px;
        gap: 8px;
      }

      .barra {
        grid-template-columns: 1fr;
        height: auto;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .personal {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
    }
  </style>
</head>

<body>

<header>
  <div class="titulo" id="titulo">Control de Cuartel</div>
  <div class="hora" id="hora"></div>
</header>

<div class="barra">
  <input id="inputIngreso" placeholder="Ingrese RUT o Nº Registro y presione ENTER" autofocus>
  <div class="contador">
    <div class="contador-num" id="contadorDisponibles">0</div>
    <div class="contador-texto">DISPONIBLES</div>
  </div>
</div>

<div id="mensaje" class="mensaje"></div>

<div class="layout">
  <section class="unidades" id="unidades"></section>
  <section class="personal" id="personal"></section>
</div>

<div class="modal-fondo" id="modalFondo">
  <div class="modal">
    <h2 id="modalTitulo">Unidad</h2>

    <div class="modal-opciones">
      <button class="btn btn-verde" onclick="mostrarConductores('principal')">Asignar principal</button>
      <button class="btn btn-azul" onclick="mostrarConductores('secundario')">Asignar secundario</button>
      <button class="btn btn-gris" onclick="quitarConductorModal('principal')">Quitar principal</button>
      <button class="btn btn-gris" onclick="quitarConductorModal('secundario')">Quitar secundario</button>
      <button class="btn btn-rojo" onclick="marcarFueraServicio()">Fuera de servicio</button>
      <button class="btn btn-gris" onclick="habilitarSinConductor()">Habilitar sin conductor</button>
    </div>

    <div class="lista-conductores" id="listaConductores"></div>

    <br>
    <button class="btn btn-gris" onclick="cerrarModal()">Cerrar</button>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzZcK5MX3Qu3hOjh0-Fj9XUS1WcnrzPRDtV8JwrboM9ql5nWdpNVMZcTO-4nXjJiJU/exec";

  const params = new URLSearchParams(window.location.search);
  const CUARTEL = params.get("cuartel") || "2";

  let unidadSeleccionada = null;
  let tipoConductorSeleccionado = "principal";
  let ultimoPanel = null;

  const nombresCuartel = {
    "1": "1ª Compañía",
    "2": "2ª Compañía Mirasol",
    "3": "3ª Compañía",
    "general": "Cuartel General"
  };

  document.getElementById("titulo").innerText = nombresCuartel[CUARTEL] || "Control de Cuartel";

  document.getElementById("inputIngreso").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      registrar();
    }
  });

  function reloj() {
    const ahora = new Date();
    document.getElementById("hora").innerText = ahora.toLocaleString("es-CL");
  }

  setInterval(reloj, 1000);
  reloj();

  async function api(query) {
    const res = await fetch(API_URL + "?" + query);
    return await res.json();
  }

  async function cargarPanel() {
    try {
      const data = await api("action=panel&cuartel=" + encodeURIComponent(CUARTEL));

      if (!data.ok) {
        mensaje("Error al cargar panel", "red");
        return;
      }

      ultimoPanel = data;
      document.getElementById("contadorDisponibles").innerText = data.disponibles;

      renderUnidades(data.unidades);
      renderBomberos(data.bomberos);

    } catch (error) {
      mensaje("Sin conexión con la base de datos", "red");
    }
  }

  async function registrar() {
    const input = document.getElementById("inputIngreso");
    const valor = input.value.trim();

    if (!valor) return;

    mensaje("Procesando...", "#444");

    const data = await api(
      "action=registrar" +
      "&input=" + encodeURIComponent(valor) +
      "&cuartel=" + encodeURIComponent(CUARTEL)
    );

    mensaje(data.mensaje, data.ok ? "green" : "red");

    input.value = "";
    input.focus();

    cargarPanel();
  }

  async function cambiarEstadoBombero(registro) {
    const card = document.querySelector(`[data-registro="${registro}"]`);
    const estadoDiv = card.querySelector(".estado");

    const estados = [
      "Disponible",
      "No disponible",
      "En capacitación",
      "En emergencia"
    ];

    const actual = estadoDiv.innerText.trim();
    const index = estados.indexOf(actual);
    const nuevo = estados[(index + 1) % estados.length];

    card.className = "bombero " + claseEstadoBombero(nuevo);
    estadoDiv.innerText = nuevo;

    actualizarContadorLocal();

    const data = await api(
      "action=cambiarEstadoBombero" +
      "&registro=" + encodeURIComponent(registro)
    );

    if (!data.ok) {
      mensaje(data.mensaje, "red");
      cargarPanel();
      return;
    }

    mensaje("Estado actualizado", "green");

    if (nuevo !== "Disponible") {
      cargarPanel();
    }
  }

  function renderBomberos(bomberos) {
    const cont = document.getElementById("personal");
    cont.innerHTML = "";

    bomberos.forEach(b => {
      const div = document.createElement("div");
      div.className = "bombero " + claseEstadoBombero(b.estado);
      div.dataset.registro = b.registro;
      div.onclick = () => cambiarEstadoBombero(b.registro);

      div.innerHTML = `
        <img src="${b.foto || 'https://via.placeholder.com/300x300?text=Sin+Foto'}" onerror="this.src='https://via.placeholder.com/300x300?text=Sin+Foto'">
        <div class="bombero-info">
          <div class="nombre">${b.nombre}</div>
          <div class="cargo">${b.cargo || ""}</div>
          <div class="estado">${b.estado}</div>
        </div>
      `;

      cont.appendChild(div);
    });
  }

  function renderUnidades(unidades) {
    const cont = document.getElementById("unidades");
    cont.innerHTML = "";

    unidades.forEach(u => {
      const div = document.createElement("div");
      div.className = "unidad " + claseEstadoUnidad(u.estado);
      div.onclick = () => abrirModalUnidad(u);

      div.innerHTML = `
        <h2>${u.unidad}</h2>
        <div class="estado-unidad">${u.estado}</div>
        <div class="conductores">
          <strong>Principal:</strong><br>
          ${u.principalNombre || "-"}<br>
          <strong>Secundario:</strong><br>
          ${u.secundarioNombre || "-"}
        </div>
      `;

      cont.appendChild(div);
    });
  }

  function abrirModalUnidad(unidad) {
    unidadSeleccionada = unidad;
    document.getElementById("modalTitulo").innerText = unidad.unidad + " - " + unidad.estado;
    document.getElementById("listaConductores").style.display = "none";
    document.getElementById("listaConductores").innerHTML = "";
    document.getElementById("modalFondo").style.display = "flex";
  }

  function cerrarModal() {
    document.getElementById("modalFondo").style.display = "none";
    unidadSeleccionada = null;
  }

  async function mostrarConductores(tipo) {
    tipoConductorSeleccionado = tipo;

    if (!unidadSeleccionada) return;

    if (unidadSeleccionada.estado === "Fuera de servicio") {
      mensaje("La unidad está fuera de servicio", "red");
      return;
    }

    const lista = document.getElementById("listaConductores");
    lista.style.display = "block";
    lista.innerHTML = "Cargando conductores habilitados...";

    const data = await api(
      "action=conductoresDisponibles" +
      "&unidad=" + encodeURIComponent(unidadSeleccionada.unidad) +
      "&cuartel=" + encodeURIComponent(CUARTEL)
    );

    if (!data.ok || data.conductores.length === 0) {
      lista.innerHTML = "<strong>No hay conductores disponibles habilitados para esta unidad.</strong>";
      return;
    }

    lista.innerHTML = "";

    data.conductores.forEach(c => {
      const item = document.createElement("div");
      item.className = "conductor-item";
      item.onclick = () => asignarConductor(c.registro);

      item.innerHTML = `
        <img src="${c.foto || 'https://via.placeholder.com/100?text=Foto'}" onerror="this.src='https://via.placeholder.com/100?text=Foto'">
        <div>
          <strong>${c.nombre}</strong><br>
          <small>${c.cargo || ""}</small>
        </div>
      `;

      lista.appendChild(item);
    });
  }

  async function asignarConductor(registro) {
    if (!unidadSeleccionada) return;

    const data = await api(
      "action=asignarConductor" +
      "&unidad=" + encodeURIComponent(unidadSeleccionada.unidad) +
      "&registro=" + encodeURIComponent(registro) +
      "&tipo=" + encodeURIComponent(tipoConductorSeleccionado)
    );

    mensaje(data.mensaje, data.ok ? "green" : "red");

    cerrarModal();
    cargarPanel();
  }

  async function quitarConductorModal(tipo) {
    if (!unidadSeleccionada) return;

    const data = await api(
      "action=quitarConductor" +
      "&unidad=" + encodeURIComponent(unidadSeleccionada.unidad) +
      "&tipo=" + encodeURIComponent(tipo)
    );

    mensaje(data.mensaje, data.ok ? "green" : "red");

    cerrarModal();
    cargarPanel();
  }

  async function marcarFueraServicio() {
    if (!unidadSeleccionada) return;

    const confirmar = confirm("¿Marcar " + unidadSeleccionada.unidad + " fuera de servicio?");
    if (!confirmar) return;

    const data = await api(
      "action=cambiarEstadoUnidad" +
      "&unidad=" + encodeURIComponent(unidadSeleccionada.unidad) +
      "&estado=" + encodeURIComponent("Fuera de servicio")
    );

    mensaje(data.mensaje, data.ok ? "green" : "red");

    cerrarModal();
    cargarPanel();
  }

  async function habilitarSinConductor() {
    if (!unidadSeleccionada) return;

    const data = await api(
      "action=cambiarEstadoUnidad" +
      "&unidad=" + encodeURIComponent(unidadSeleccionada.unidad) +
      "&estado=" + encodeURIComponent("Sin conductor")
    );

    mensaje(data.mensaje, data.ok ? "green" : "red");

    cerrarModal();
    cargarPanel();
  }

  function actualizarContadorLocal() {
    const estados = Array.from(document.querySelectorAll(".bombero .estado"))
      .map(e => e.innerText.trim());

    const disponibles = estados.filter(e => e === "Disponible").length;

    document.getElementById("contadorDisponibles").innerText = disponibles;
  }

  function claseEstadoBombero(estado) {
    if (estado === "Disponible") return "disponible";
    if (estado === "No disponible") return "no-disponible";
    if (estado === "En capacitación") return "en-capacitacion";
    if (estado === "En emergencia") return "en-emergencia";
    return "";
  }

  function claseEstadoUnidad(estado) {
    if (estado === "Disponible") return "disponible";
    if (estado === "Sin conductor") return "sin-conductor";
    if (estado === "Fuera de servicio") return "fuera-de-servicio";
    return "";
  }

  function mensaje(texto, color) {
    const div = document.getElementById("mensaje");
    div.innerText = texto || "";
    div.style.color = color || "#222";

    setTimeout(() => {
      div.innerText = "";
    }, 3500);
  }

  cargarPanel();
  setInterval(cargarPanel, 15000);
</script>

</body>
</html>
